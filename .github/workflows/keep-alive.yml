name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render
        run: |
          curl -L \
            --silent \
            --show-error \
            --max-time 180 \
            --retry 2 \
            --output /dev/null \
            --write-out "HTTP Status: %{http_code}\n" \
            "https://samu-192-ntl-pharma.onrender.com/"
